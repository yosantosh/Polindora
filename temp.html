<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus — Neon Rose UI Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700&display=swap');

        :root {
            --pink: #ff2d78;
            --pink-soft: #ff69b4;
            --pink-glow: rgba(255, 45, 120, 0.3);
            --bg-dark: #0a0408;
            --bg-card: rgba(30, 5, 20, 0.95);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);
            --border: rgba(255, 45, 120, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .app {
            width: 380px;
            background: linear-gradient(180deg, #1a0a12 0%, #0d0408 100%);
            border-radius: 28px;
            border: 1px solid rgba(255, 45, 120, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            padding: 20px 0;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            padding: 4px 24px 16px;
        }

        .header .star {
            color: var(--pink);
            font-size: 18px;
            margin-right: 8px;
        }

        .header .title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
            letter-spacing: 0.3px;
        }

        .header .dots {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* Timer Area */
        .timer-area {
            margin: 0 20px 12px;
            padding: 28px 20px 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(30, 5, 20, 0.95), rgba(15, 2, 10, 0.90));
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 2px rgba(255, 45, 120, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative wave overlay */
        .timer-area::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 200px;
            height: 100px;
            background: radial-gradient(ellipse at top right,
                    rgba(255, 45, 120, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .timer-circle {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            border: 3px solid rgba(255, 45, 120, 0.35);
            background: radial-gradient(circle, rgba(20, 3, 12, 0.95), rgba(10, 1, 6, 0.98));
            box-shadow: 0 0 25px rgba(255, 45, 120, 0.12),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Glowing dot on the ring */
        .ring-dot {
            position: absolute;
            top: -5px;
            right: 40px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--pink);
            box-shadow: 0 0 8px var(--pink-glow), 0 0 16px rgba(255, 45, 120, 0.2);
        }

        .leaf-icon {
            font-size: 22px;
            color: var(--pink);
            margin-bottom: 2px;
            filter: drop-shadow(0 0 4px var(--pink-glow));
        }

        .state-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--pink);
            text-shadow: 0 0 8px var(--pink-glow);
        }

        .time-digits {
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
            font-variant-numeric: tabular-nums;
            margin: -2px 0;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 45, 120, 0.15);
            border: 1px solid rgba(255, 45, 120, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: rgba(255, 45, 120, 0.3);
            box-shadow: 0 0 16px rgba(255, 45, 120, 0.25);
        }

        .play-btn svg {
            fill: var(--pink);
            width: 14px;
            height: 14px;
            margin-left: 2px;
        }

        /* Motivation */
        .motivation {
            text-align: center;
            font-size: 12px;
            font-style: italic;
            color: var(--text-secondary);
            padding: 10px 24px 4px;
        }

        /* Stats Card */
        .stats-card {
            margin: 8px 20px;
            padding: 14px 18px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 45, 120, 0.08), rgba(255, 45, 120, 0.03));
            border: 1px solid rgba(255, 45, 120, 0.12);
            display: flex;
            align-items: center;
        }

        .stats-left,
        .stats-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-icon {
            font-size: 20px;
            color: var(--pink);
        }

        .stats-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stats-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stats-dot {
            flex: 1;
            text-align: center;
            color: rgba(255, 45, 120, 0.4);
            font-size: 10px;
        }

        .stats-focus-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--pink);
            text-shadow: 0 0 8px var(--pink-glow);
        }

        .stats-focus-label {
            font-size: 11px;
            color: var(--pink-soft);
            font-weight: 500;
        }

        /* Tasks Section */
        .tasks-header {
            display: flex;
            align-items: center;
            padding: 12px 24px 6px;
        }

        .tasks-header .icon {
            font-size: 14px;
            color: var(--text-muted);
            margin-right: 6px;
        }

        .tasks-header .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            flex: 1;
            letter-spacing: 0.5px;
        }

        .tasks-header .edit {
            font-size: 12px;
            color: var(--pink);
            cursor: pointer;
        }

        .task-row {
            display: flex;
            align-items: center;
            margin: 3px 20px;
            padding: 12px 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .task-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255, 45, 120, 0.4);
            margin-right: 12px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-circle:hover {
            border-color: rgba(255, 45, 120, 0.7);
            box-shadow: 0 0 6px var(--pink-glow);
        }

        .task-text {
            flex: 1;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
        }

        .task-more {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }

        /* Start Button */
        .start-btn {
            margin: 12px 20px;
            padding: 16px 20px;
            border-radius: 14px;
            background: linear-gradient(135deg,
                    rgba(255, 45, 120, 0.45),
                    rgba(200, 20, 90, 0.35),
                    rgba(160, 10, 70, 0.30));
            border: 1px solid rgba(255, 45, 120, 0.35);
            box-shadow: 0 4px 20px rgba(255, 45, 120, 0.20),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s;
        }

        .start-btn:hover {
            background: linear-gradient(135deg,
                    rgba(255, 45, 120, 0.60),
                    rgba(200, 20, 90, 0.50),
                    rgba(160, 10, 70, 0.45));
            box-shadow: 0 6px 28px rgba(255, 45, 120, 0.35);
        }

        .start-btn .play-icon {
            font-size: 18px;
            margin-right: 10px;
            color: var(--text-primary);
        }

        .start-btn .label {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .start-btn .chevron {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            padding: 8px 24px 4px;
        }

        .settings-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .settings-btn .icon {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.45);
        }

        .settings-btn .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 500;
        }

        .power-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255, 45, 120, 0.12);
            border: 1px solid rgba(255, 45, 120, 0.3);
            box-shadow: 0 0 10px rgba(255, 45, 120, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            cursor: pointer;
            transition: all 0.25s;
        }

        .power-btn:hover {
            background: rgba(255, 45, 120, 0.25);
            box-shadow: 0 0 16px rgba(255, 45, 120, 0.3);
        }

        .power-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--pink);
            stroke-width: 2;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <span class="star">★</span>
            <span class="title">Pomodoro Focus</span>
            <div class="dots">···</div>
        </div>

        <!-- Timer Area -->
        <div class="timer-area">
            <div class="timer-circle">
                <div class="ring-dot"></div>
                <div class="leaf-icon">🌿</div>
                <div class="state-label">FOCUS</div>
                <div class="time-digits">25:00</div>
                <div class="play-btn">
                    <svg viewBox="0 0 24 24">
                        <polygon points="8,5 20,12 8,19" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Motivation -->
        <div class="motivation">Take a breather, then get back to it.</div>

        <!-- Stats Card -->
        <div class="stats-card">
            <div class="stats-left">
                <span class="stats-icon">📊</span>
                <div>
                    <div class="stats-label">Today</div>
                    <div class="stats-value">1 pomodoro</div>
                </div>
            </div>
            <div class="stats-dot">·</div>
            <div class="stats-right">
                <span class="stats-icon">⏱</span>
                <div>
                    <div class="stats-focus-value">25m</div>
                    <div class="stats-focus-label">focused</div>
                </div>
            </div>
        </div>

        <!-- Tasks -->
        <div class="tasks-header">
            <span class="icon">≡</span>
            <span class="label">Top 3 Tasks</span>
            <span class="edit">Edit ✎</span>
        </div>
        <div class="task-row">
            <div class="task-circle"></div>
            <span class="task-text">Statsweek2</span>
            <span class="task-more">⋮</span>
        </div>
        <div class="task-row">
            <div class="task-circle"></div>
            <span class="task-text">mathsweek1 to 5 graded assignments</span>
            <span class="task-more">⋮</span>
        </div>
        <div class="task-row">
            <div class="task-circle"></div>
            <span class="task-text">Review chapter 3 notes</span>
            <span class="task-more">⋮</span>
        </div>

        <!-- Start Button -->
        <div class="start-btn">
            <span class="play-icon">▶</span>
            <span class="label">Start Focus Session</span>
            <span class="chevron">›</span>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <div class="settings-btn">
                <span class="icon">⚙</span>
                <span class="label">Settings</span>
            </div>
            <div class="power-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2v10M18.36 6.64A9 9 0 1 1 5.64 6.64" />
                </svg>
            </div>
        </div>
    </div>
</body>

</html>
